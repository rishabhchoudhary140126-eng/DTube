<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="headerStyle.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="watch.css">
</head>
<body>
    <div class = "header">
        <div class = "logo" id = "header_logo">
            <a href="/">
                <img id = "logo_img" src="uploads/imagegs/logo.png" alt="D-Tube Logo">
            </a>
        </div>
        <div class = "links">
            
            <button class = "upload_button" onclick="window.location.href='/upload.html'" id = "upload_button">Upload</button>
            
            <button id="profile_button" onclick="window.location.href='/profile.html'"> <img id="profile_img" src="uploads/imagegs/profile.png" alt="Profile"> </button>
        </div>    
    </div>



    <div class="video_container">

        <div class="left_side">
            <video class="video_player" controls loop> <source id = "videoPath" src="uploads/videos/video.mp4" type="video/webm" /></video>
        </div>
        <div class="right_side">
            <h2 id = "videoTitle">Video Title-D-Tube urwwisuguryswuyirb8eyufhbuwyfbsuiyfheri fsi7uurf sruusi</h2>
            <h4>Description: </h4>
            <span id="videoDescription">This is a simple video description.</span>
            <div class="channel_info_watch">
                <a href="/channel.html"  >
                    <img class="channel_logo" src="uploads/imagegs/profile_pic/_Soft pink 💗 _moon_ with dreamy word ✨️ _.jpeg" alt="Channel Logo">
                    <span class="channel_name_home">DTube Official</span>
                </a>
                <button class="subscribe_button">Subscribe</button>
            </div>
        </div>

        
    </div>


    <script>
        const email = localStorage.getItem("email");
        const password = localStorage.getItem("password");
        const videoPath = new URLSearchParams(window.location.search).get("videoPath");
        const fetchUrl = "http://localhost:3000/video?videoPath=" + videoPath;
        console.log(videoPath);
            async function fetchVideoData(){
                const response = await fetch(fetchUrl, {
                    headers: {
                        email,
                        password
                    }
                });
                const result = await response.json();
                console.log(result);
                const videoPath = document.getElementById("videoPath");
                videoPath.src = result.path;
                const videoTitle = document.getElementById("videoTitle");
                videoTitle.innerText = result.title;
                const videoDescription = document.getElementById("videoDescription");
                videoDescription.innerText = result.description;
                const video = document.querySelector(".video_player");
                video.load();
        }
        fetchVideoData();
    </script>
</body>
</html>
