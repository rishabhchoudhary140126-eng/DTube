<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="headerStyle.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="watch.css">
</head>
<body>
    <div class = "header">
        <div class = "logo" id = "header_logo">
            <a href="/">
                <img id = "logo_img" src="/defaults/logo.png" alt="D-Tube Logo">
            </a>
        </div>
        <div class = "links">
            
            <button class = "upload_button" onclick="window.location.href='/upload.html'" id = "upload_button">Upload</button>
            
            <button id="profile_button" onclick="window.location.href='/profile.html'"> <img id="profile_img" src="defaults/logo.png" alt="Profile"> </button>
        </div>    
    </div>



    <div class="video_container">

        <div class="left_side">
            <video class="video_player" controls loop> <source id = "videoPath" src="uploads/videos/video.mp4" type="video/webm" /></video>
        </div>
        <div class="right_side">
            <h2 id = "videoTitle">Video Title-D-Tube urwwisuguryswuyirb8eyufhbuwyfbsuiyfheri fsi7uurf sruusi</h2>
            <div class="video_meta"style="font-size: 11px;">
                <span id="viewCount"><span class="viewCount" id="viewCountSpan">0</span> views</span>
            </div>
            <div class="channel_info_watch">
                <a href="/channel.html" id = "openChannelButton" >
                    <img class="channel_logo" id = "channel_logo" src="defaults/logo.png" alt="Channel Logo">
                    <span class="channel_name_home" id="channel_name_home">DTube Official</span>
                </a>
                <button class="subscribe_button" id="subscribe_button">Subscribe</button>
            </div>
            <h4>Description: </h4>
            <span id="videoDescription">This is a simple video description.</span>
        </div>

        
    </div>


    <script>
        const viewCount = document.getElementById("viewCount");

        async function loadProfilePic(){
            const email = localStorage.getItem("email");
            const password = localStorage.getItem("password");
            const response = await fetch("http://localhost:3000/profile_pic", {
                headers : {
                    email,
                    password
                }
            });
            const path = await response.json();
            const profile_img = document.getElementById("profile_img");
            profile_img.src = path.profilePath;

        }
        loadProfilePic();
        

        const email = localStorage.getItem("email");
        const password = localStorage.getItem("password");
        const videoPath = new URLSearchParams(window.location.search).get("videoPath");
        const fetchUrl = "http://localhost:3000/video?videoPath=" + videoPath;
        async function fetchVideoData(){
            const response = await fetch(fetchUrl, {
                headers: {
                    email,
                    password
                }
            });
            const result = await response.json();
            const videoPath = document.getElementById("videoPath");
            videoPath.src = result.path;
            const videoTitle = document.getElementById("videoTitle");
            videoTitle.innerText = result.title;
            const videoDescription = document.getElementById("videoDescription");
            videoDescription.innerText = result.description;
            const channel_name_home = document.getElementById("channel_name_home");
            channel_name_home.innerText = result.channelName;
            const channel_logo = document.getElementById("channel_logo");
            channel_logo.src = result.channelLogoPath;
            const video = document.querySelector(".video_player");
            video.load();
        }
        fetchVideoData();

        const subscribe_button = document.getElementById("subscribe_button");
        subscribe_button.addEventListener("click", async function (){
            const videoPath = new URLSearchParams(window.location.search).get("videoPath");
            const fetchUrl = "http://localhost:3000/userSubscribed?videoPath=" + videoPath;
            const hitSubscribe = await fetch(fetchUrl, {
                method: "POST",
                headers : {
                    email: localStorage.getItem("email"), 
                    password: localStorage.getItem("password")
                }
            });
            const message = await hitSubscribe.text();
            if(hitSubscribe.ok) subscribe_button.innerText = "Subscribed"
        });

        async function viewSync(){
            const viewCountSpan = document.getElementById("viewCountSpan");
            const videoPath = new URLSearchParams(window.location.search).get("videoPath");
            const fetchUrl = "http://localhost:3000/viewCount?videoPath=" + videoPath;
            const response = await fetch(fetchUrl, {
                method : "GET",
                headers: {
                    email: localStorage.getItem("email"),
                    password: localStorage.getItem("password")
                }
            })
            const views = await response.text();
            viewCountSpan.innerText = views;

        }
        viewSync();






        const openChannelButton = document.getElementById("openChannelButton");
        const emailFolderName = videoPath.split("/")[2];
        const channelEmail = emailFolderName.replaceAll("_gmail_com", "@gmail.com");
        console.log(channelEmail);
        openChannelButton.href = `/channel.html?channelEmail=${channelEmail}`;
    </script>
</body>
</html>
