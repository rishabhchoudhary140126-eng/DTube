<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="headerStyle.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class = "header">
        <div class = "logo" id = "header_logo">
            <a href="/">
                <img id = "logo_img" src="/defaults/logo.png" alt="D-Tube Logo">
            </a>
        </div>
        <div class = "links">
            
            <button class = "upload_button" onclick="window.location.href='/upload.html'" id = "upload_button">Upload</button>
            
            <button id="profile_button" onclick="window.location.href='/profile.html'"> <img id="profile_img" src="imagegs/profile.png" alt="Profile"> </button>
        </div>    
    </div>

    <div class="profile_container">

        <div class="profile_info" id = "profile_info">
            <img class="profile_picture" id = "profile_pic_image" src="defaults/logo.png" alt="Profile">

            <div class="channel_name", id="channel_name">
                <h1>D-Tube Official</h1>
            </div>
        </div>

        <hr>
        <br>

        <div class="video_container" id = "video_container">


        </div>

    </div>

    <script>
        async function loadProfilePic(){
            const email = localStorage.getItem("email");
            const password = localStorage.getItem("password");
            const response = await fetch("http://localhost:3000/profile_pic", {
                headers : {
                    email,
                    password
                }
            });
            console.log(response);
            const path = await response.json();
            console.log(path.profilePath);
            const profile_img = document.getElementById("profile_img");
            profile_img.src = path.profilePath;

        }
        loadProfilePic();

        async function channelLoader(){
            const channelEmail = new URLSearchParams(window.location.search).get("channelEmail");
            const fetchURL = "http://localhost:3000/channelPage?channelEmail=" + channelEmail;
            const response = await fetch(fetchURL, {
                headers: {
                    email: localStorage.getItem("email"),
                    password: localStorage.getItem("password")
                }
            });
            const channelData = await response.json();
            const profile_pic_image = document.getElementById("profile_pic_image");
            profile_pic_image.src = channelData.profile_pic_path;
            const channel_name = document.getElementById("channel_name");
            channel_name.innerHTML = `<h1>${channelData.channelName}</h1>`;
            console.log(channelData.channelName);

            const video_container = document.getElementById("video_container");
            video_container.innerHTML = "";
            for(let i=0; i<channelData.videos.length; i++){
                video_container.innerHTML = video_container.innerHTML + `
                <a href = "/watch.html?videoPath=${channelData.videos[i].videoPath}">
                    <div class="video">
                        <img class="thumbnail" src="${channelData.videos[i].thumbnailPath}" alt="D-tube title">
                        <h3>${channelData.videos[i].title}</h3>
                    </div>
                </a>
                `;
            }
            
        }
        channelLoader();
    </script>
    
</body>
</html>
