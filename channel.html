<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="headerStyle.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class = "header">
        <div class = "logo" id = "header_logo">
            <a href="/">
                <img id = "logo_img" src="/defaults/logo.png" alt="D-Tube Logo">
            </a>
        </div>
        <div class = "links">
            
            <button class = "upload_button" onclick="window.location.href='/upload.html'" id = "upload_button">Upload</button>
            
            <button id="profile_button" onclick="window.location.href='/profile.html'"> <img id="profile_img" src="imagegs/profile.png" alt="Profile"> </button>
        </div>    
    </div>

    <div class="profile_container">

        <div class="profile_info" id = "profile_info">
            <img class="profile_picture" src="defaults/krish.png" alt="Profile">

            <div class="channel_name">
                <h1>D-Tube Official</h1>
            </div>
        </div>

        <hr>
        <br>

        <div class="video_container" id = "video_container">

            <div class="video">
                <img class="thumbnail" src="defaults/krish.png" alt="">
                <h3>First Video</h3>
            </div>

            <div class="video">
                <img class="thumbnail" src="defaults/krish.png" alt="">
                <h3>Second Video</h3>
            </div>

            <div class="video">
                <img class="thumbnail" src="defaults/krish.png" alt="">
                <h3>Third Video</h3>
            </div>

            <div class="video">
                <img class="thumbnail" src="defaults/krish.png" alt="">
                <h3>Fourth Video</h3>
            </div>

        </div>

    </div>

    <script>
        async function loadProfilePic(){
            const email = localStorage.getItem("email");
            const password = localStorage.getItem("password");
            const response = await fetch("http://localhost:3000/profile_pic", {
                headers : {
                    email,
                    password
                }
            });
            console.log(response);
            const path = await response.json();
            console.log(path.profilePath);
            const profile_img = document.getElementById("profile_img");
            profile_img.src = path.profilePath;

        }
        loadProfilePic();
        
    </script>
    
</body>
</html>
