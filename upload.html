<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="headerStyle.css">
    <link rel="stylesheet" href="upload.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class = "header">
        <div class = "logo" id = "header_logo">
            <a href="/">
                <img id = "logo_img" src="uploads/imagegs/logo.png" alt="D-Tube Logo">
            </a>
        </div>
        <div class = "links">
            
            <button class = "upload_button" onclick="window.location.href='/upload.html'" id = "upload_button">Upload</button>
            
            <button id="profile_button" onclick="window.location.href='/profile.html'"> <img id="profile_img" src="uploads/imagegs/profile.png" alt="Profile"> </button>
        </div>    
    </div>


        

    <form action="#" class="metadata_collector_upload">

        <div class="upload_files">

            <div class="upload_file">

                <label for="videoInput" class="upload_box">
                    <span>📁 Upload Video</span>
                    <small>Select a video to upload</small>
                </label>

                <input
                    type="file"
                    id="videoInput"
                    accept="mp4"
                >

            </div>

            <div class="upload_file">

                <label for="thumbnailInput" class="upload_box">
                    <span>🖼 Upload Thumbnail</span>
                    <small>Select an image to upload</small>
                </label>

                <input
                    type="file"
                    id="thumbnailInput"
                    accept= "jpg"
                >

            </div>

        </div>

        <input
            type="text"
            id = "titleInput"
            class="title_upload"
            placeholder="Enter video title"
        >

        <textarea
            type="text"
            id = "descriptionInput"
            class="description_upload"
            placeholder="Enter video description"
        ></textarea>

        <button
            type="submit"
            class="upload_button"
            id = "upload_video_button"
        >
            Upload Video
        </button>

    </form>


    <script>
        const uploadButton = document.getElementById('upload_video_button');
        uploadButton.addEventListener('click', async (event) => {
            event.preventDefault();

            const video = document.getElementById('videoInput').files[0];
            const thumbnail = document.getElementById('thumbnailInput').files[0];
            const title = document.getElementById('titleInput').value;
            const description = document.getElementById('descriptionInput').value;

            if(!video || !thumbnail || !title || !description) {
                alert('Please fill in all fields and select files before uploading.');
                return;
            }

            const form = new FormData();
            form.append('video', video);
            form.append('thumbnail', thumbnail);
            form.append('title', title);
            form.append('description', description);


            const res = await fetch('http://localhost:3000/upload', {
                method: 'POST',
                headers: {
                    'email': localStorage.getItem('email'),
                    'password': localStorage.getItem('password')
                },
                body: form
            });

            const message = await res.text();
            if (res.ok) {
                alert('Upload successful!');
            } else {
                alert('Upload failed: ' + message);
            }
        })
    </script>
    
</body>
</html>
