<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Tube</title>
    <link rel="stylesheet" href="headerStyle.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="home.css">
</head>


<body>
    <div class = "header">
        <div class = "logo" id = "header_logo">
            <a href="/">
                <img id = "logo_img" src="/defaults/logo.png" alt="D-Tube Logo">
            </a>
        </div>
        <div class = "links">
            
            <button class = "upload_button" onclick="window.location.href='/upload.html'" id = "upload_button">Upload</button>
            
            <button id="profile_button" onclick="window.location.href='/profile.html'"> <img id="profile_img" src="/defaults/logo.png" alt="Profile"> </button>
        </div>    
    </div>




    <div class="contents">
        <div class="video_container" id = "video_container">
            

            
        </div>      
    </div>

    





    <script>
        async function loadProfilePic(){
            const email = localStorage.getItem("email");
            const password = localStorage.getItem("password");
            const response = await fetch("http://localhost:3000/profile_pic", {
                headers : {
                    email,
                    password
                }
            });
            console.log(response);
            const path = await response.json();
            console.log(path.profilePath);
            const profile_img = document.getElementById("profile_img");
            profile_img.src = path.profilePath;

        }
        loadProfilePic();

        function displayVideos(videos){
            const container = document.getElementById("video_container");
            container.innerHTML = "";
            for(let i=0; i<videos.length; i++){
                container.innerHTML = container.innerHTML + `
                <a href="/watch.html?videoPath=${videos[i].thumbnailPath.replaceAll(".jpg",".mp4")}">
                    <div class = "video">
                        <div class="video_thumbnail">
                            <img src="${videos[i].thumbnailPath}" alt="thumbnailImg">
                        </div>
                        <div class="video_details">

                            <div class="channel_logo">
                                <img src="${videos[i].channelLogoPath}" alt="logoImg">
                            </div>

                            <div class="title">
                                <h4>${videos[i].title}</h4>
                            </div>
                        </div>

                    </div>
                </a>
                `
            }
        }



        async function getVideos() {
            const email = localStorage.getItem("email");
            const password = localStorage.getItem("password");

            const response = await fetch("http://localhost:3000/videos", {
                headers: {
                    email,
                    password
                }
            });

            const videos = await response.json();

            displayVideos(videos);
        }

        getVideos();

        

    </script>
</body>
</html>
