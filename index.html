<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Tube</title>

    <link rel="stylesheet" href="headerStyle.css">
    <link rel="stylesheet" href="signup.css">
</head>

<body>

    <script>
        const email = localStorage.getItem("email");
        const password = localStorage.getItem("password");

        async function loginCheck() {
            const profile = await fetch("http://localhost:3000/profile", {
                headers: {
                    email,
                    password
                }
            })
            if(profile.ok){
                window.location.replace("/home.html");
                return;
            }
            else {
                localStorage.removeItem("email");
                localStorage.removeItem("password");
                alert("Please login/signup");
            }

        }
        loginCheck();
    </script>





    <div class="header">
        <div class="logo" id="header_logo">
            <img id="logo_img" src="/defaults/logo.png" alt="D-Tube Logo">
        </div>

        <div class="links">
            <button class="upload_button" onclick="window.location.href='/upload.html'" id="upload_button">
                Upload
            </button>

            <button id="profile_button" onclick="window.location.href='/profile.html'">
                <img id="profile_img" src="/defaults/logo.png" alt="Profile">
            </button>
        </div>
    </div>

    <section class="signup">

        <h1>Welcome to D-Tube</h1>
        <br>

        <button id="loginButton" onclick="window.location.href='/login.html'">
            Login
        </button>

        <br><br>

        <button onclick="window.location.href='/signup.html'">
            Sign Up
        </button>

    </section>

    <script>

    </script>
</body>
</html>
