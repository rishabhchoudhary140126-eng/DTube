<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="headerStyle.css">
    <link rel="stylesheet" href="signup.css">

</head>
<body>
    <div class = "header">
        <div class = "logo" id = "header_logo">
            <img id = "logo_img" src="/defaults/logo.png" alt="D-Tube Logo">
        </div>
        <div class = "links">
            
            <button class = "upload_button" onclick="window.location.href='/upload.html'" id = "upload_button">Upload</button>
            
            <button id="profile_button" onclick="window.location.href='/profile.html'"> <img id="profile_img" src="imagegs/profile.png" alt="Profile"> </button>
        </div>    
    </div>

    <section class="signup">

        <h1>Login</h1>


        <label for="email">Email</label><br>
        <input type="email" id="email"><br><br>

        <label for="password">Password</label><br>
        <input type="password" id="password"><br><br>


        <button id = "loginButton">Login</button>

    </section>



    <script>
        async function loadProfilePic(){
            const email = localStorage.getItem("email");
            const password = localStorage.getItem("password");
            const response = await fetch("http://localhost:3000/profile_pic", {
                headers : {
                    email,
                    password
                }
            });
            console.log(response);
            const path = await response.json();
            console.log(path.profilePath);
            const profile_img = document.getElementById("profile_img");
            profile_img.src = path.profilePath;

        }
        loadProfilePic();


        const loginButton = document.getElementById('loginButton');
        loginButton.addEventListener('click', async () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (!email || !password) {
                alert("Please fill in both email and password.");
                return;
            }

            const res = await fetch('http://localhost:3000/login', {
                method: 'POST',
                headers: {
                    email: email,
                    password: password
                }
            });

            const message = await res.text();

            if (res.ok) {
                localStorage.setItem("email", email);
                localStorage.setItem("password", password);
                alert(message);
                window.location.href='/home.html'
            } else {
                alert(message);
}

            
            

        });
    </script>

</body>
</html>
